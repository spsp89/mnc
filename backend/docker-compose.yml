services:
  postgres:
    image: postgres:16
    container_name: bnc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bnc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bnc-postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

volumes:
  bnc-postgres-data:
